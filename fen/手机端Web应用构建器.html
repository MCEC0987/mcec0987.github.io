                                <i class="fas fa-bolt"></i> 配置事件
                            </button>
                        </div>
                    `;
                    break;
                    
                case 'button':
                    formHTML = `
                        <div class="form-group">
                            <label class="form-label">按钮文本</label>
                            <input type="text" class="form-control" id="compText" placeholder="请输入按钮文本" value="${componentData.text || '按钮'}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">背景颜色</label>
                            <input type="color" class="form-control" id="compBgColor" value="${componentData.bgColor || '#4361ee'}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">文本颜色</label>
                            <input type="color" class="form-control" id="compTextColor" value="${componentData.textColor || '#ffffff'}">
                        </div>
                        <div class="form-group">
                            <button class="btn btn-outline" style="width: 100%;" onclick="showEventEditor()">
                                <i class="fas fa-bolt"></i> 配置事件
                            </button>
                        </div>
                    `;
                    break;
                    
                case 'image':
                    formHTML = `
                        <div class="form-group">
                            <label class="form-label">图片URL</label>
                            <input type="text" class="form-control" id="compSrc" placeholder="请输入图片URL" value="${componentData.src || ''}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">替代文本</label>
                            <input type="text" class="form-control" id="compAlt" placeholder="请输入替代文本" value="${componentData.alt || '图片'}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">宽度</label>
                            <input type="text" class="form-control" id="compWidth" placeholder="例如: 100% 或 300px" value="${componentData.width || '100%'}">
                        </div>
                        <div class="form-group">
                            <button class="btn btn-outline" style="width: 100%;" onclick="showEventEditor()">
                                <i class="fas fa-bolt"></i> 配置事件
                            </button>
                        </div>
                    `;
                    break;
                    
                case 'list':
                    const items = componentData.items ? componentData.items.join('\n') : '';
                    formHTML = `
                        <div class="form-group">
                            <label class="form-label">列表标题</label>
                            <input type="text" class="form-control" id="compTitle" placeholder="请输入列表标题" value="${componentData.title || ''}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">列表项（每行一项）</label>
                            <textarea class="form-control form-textarea" id="compItems" placeholder="请输入列表项，每行一项">${items}</textarea>
                        </div>
                        <div class="form-group">
                            <button class="btn btn-outline" style="width: 100%;" onclick="showEventEditor()">
                                <i class="fas fa-bolt"></i> 配置事件
                            </button>
                        </div>
                    `;
                    break;
            }
            
            componentForm.innerHTML = formHTML;
            
            // 保存当前组件的事件数据
            if (componentData.events) {
                AppState.editingEvents = componentData.events;
            } else {
                AppState.editingEvents = [];
            }
            
            showModal('componentModal');
        }

        // 显示事件编辑器
        window.showEventEditor = function() {
            // 先保存组件属性的修改
            saveComponentChangesTemp();
            
            // 加载事件列表
            loadEventList();
            
            // 显示事件编辑器
            hideModal();
            showModal('eventModal');
        };

        // 临时保存组件更改
        function saveComponentChangesTemp() {
            if (!AppState.editingComponent) return;
            
            const component = AppState.currentProject.components.find(c => c.id === AppState.editingComponent);
            if (!component) return;
            
            const type = component.data.type;
            
            switch(type) {
                case 'text':
                    component.data.text = document.getElementById('compText').value;
                    component.data.fontSize = document.getElementById('compFontSize').value;
                    component.data.color = document.getElementById('compColor').value;
                    break;
                    
                case 'button':
                    component.data.text = document.getElementById('compText').value;
                    component.data.bgColor = document.getElementById('compBgColor').value;
                    component.data.textColor = document.getElementById('compTextColor').value;
                    break;
                    
                case 'image':
                    component.data.src = document.getElementById('compSrc').value;
                    component.data.alt = document.getElementById('compAlt').value;
                    component.data.width = document.getElementById('compWidth').value;
                    break;
                    
                case 'list':
                    component.data.title = document.getElementById('compTitle').value;
                    const itemsText = document.getElementById('compItems').value;
                    component.data.items = itemsText.split('\n').filter(item => item.trim() !== '');
                    break;
            }
            
            // 保存事件
            component.data.events = AppState.editingEvents;
            
            // 更新组件显示
            updateComponentDisplay(AppState.editingComponent, component.data);
        }

        // 保存组件更改
        function saveComponentChanges() {
            saveComponentChangesTemp();
            updateProjectData();
            alert('组件属性已保存！');
            hideModal();
        }

        // 更新组件显示
        function updateComponentDisplay(componentId, data) {
            const component = document.querySelector(`.component-item[data-id="${componentId}"]`);
            if (!component) return;
            
            const type = data.type;
            let content = '';
            
            switch(type) {
                case 'text':
                    content = `<h3 style="font-size: ${data.fontSize}; color: ${data.color};">${data.text}</h3>`;
                    break;
                    
                case 'image':
                    if (data.src) {
                        content = `<img src="${data.src}" alt="${data.alt}" style="width: ${data.width}; border-radius: 6px;">`;
                    } else {
                        content = '<div style="text-align: center;"><i class="fas fa-image" style="font-size: 32px; color: #ccc;"></i><p style="font-size: 0.9rem;">图片组件</p></div>';
                    }
                    break;
                    
                case 'button':
                    content = `<button style="padding: 10px 20px; background-color: ${data.bgColor}; color: ${data.textColor}; border: none; border-radius: 6px; font-size: 14px; width: 100%;">${data.text}</button>`;
                    break;
                    
                case 'list':
                    if (data.items && data.items.length > 0) {
                        content = `<h4>${data.title || '列表'}</h4><ul>${data.items.map(item => `<li>${item}</li>`).join('')}</ul>`;
                    } else {
                        content = '<h4>列表组件</h4><ul><li>列表项 1</li><li>列表项 2</li><li>列表项 3</li></ul>';
                    }
                    break;
            }
            
            const contentElement = component.querySelector('.component-content');
            if (contentElement) {
                contentElement.innerHTML = content;
            }
        }

        // 删除组件
        window.deleteComponent = function(componentId) {
            if (confirm('确定要删除这个组件吗？')) {
                const component = document.querySelector(`.component-item[data-id="${componentId}"]`);
                if (component) {
                    component.remove();
                    
                    // 从项目数据中移除
                    if (AppState.currentProject.components) {
                        AppState.currentProject.components = AppState.currentProject.components.filter(c => c.id !== componentId);
                        updateProjectData();
                    }
                    
                    // 检查是否还有组件
                    const remainingComponents = document.querySelectorAll('.component-item');
                    if (remainingComponents.length === 0) {
                        const editorCanvas = document.getElementById('editorCanvas');
                        const placeholder = document.createElement('div');
                        placeholder.className = 'canvas-placeholder';
                        placeholder.innerHTML = `
                            <i class="fas fa-mouse-pointer"></i>
                            <p>点击上方组件添加到画布</p>
                            <p style="font-size: 0.85rem; margin-top: 6px;">长按组件可拖动排序</p>
                        `;
                        editorCanvas.appendChild(placeholder);
                    }
                    
                    alert('组件已删除！');
                }
            }
        };

        // 保存组件数据
        function saveComponentData(componentId, data) {
            if (!AppState.currentProject.components) {
                AppState.currentProject.components = [];
            }
            
            // 查找现有组件
            const existingIndex = AppState.currentProject.components.findIndex(c => c.id === componentId);
            
            if (existingIndex >= 0) {
                // 更新现有组件
                AppState.currentProject.components[existingIndex].data = data;
            } else {
                // 添加新组件
                AppState.currentProject.components.push({
                    id: componentId,
                    type: data.type,
                    data: data
                });
            }
            
            // 保存项目
            updateProjectData();
        }

        // 切换编辑器标签
        function switchEditorTab(tab) {
            const htmlTabBtn = document.getElementById('htmlTabBtn');
            const visualTabBtn = document.getElementById('visualTabBtn');
            const htmlEditor = document.getElementById('htmlEditor');
            const visualEditor = document.getElementById('visualEditor');
            
            if (tab === 'html') {
                htmlTabBtn.classList.add('active');
                visualTabBtn.classList.remove('active');
                htmlEditor.style.display = 'block';
                visualEditor.classList.remove('active');
            } else {
                htmlTabBtn.classList.remove('active');
                visualTabBtn.classList.add('active');
                htmlEditor.style.display = 'none';
                visualEditor.classList.add('active');
            }
        }

        // 加载数据库表
        function loadDatabaseTables() {
            const tableList = document.getElementById('tableList');
            const emptyTables = document.getElementById('emptyTables');
            
            if (!AppState.currentProject || !AppState.currentProject.tables || AppState.currentProject.tables.length === 0) {
                emptyTables.style.display = 'block';
                tableList.innerHTML = '';
                return;
            }
            
            emptyTables.style.display = 'none';
            
            let tablesHTML = '';
            AppState.currentProject.tables.forEach(table => {
                const fieldCount = table.fields ? table.fields.length : 0;
                const dataCount = table.data ? table.data.length : 0;
                
                tablesHTML += `
                    <div class="table-card" data-id="${table.id}">
                        <button class="table-delete-btn" onclick="deleteTable('${table.id}', event)">
                            <i class="fas fa-times"></i>
                        </button>
                        <div class="table-header" onclick="openTableDetail('${table.id}')">
                            <div class="table-name">${table.name}</div>
                            <div class="table-type">${table.type === 'config' ? '配置表' : '列表'}</div>
                        </div>
                        <p style="font-size: 0.85rem; color: var(--gray); margin-bottom: 12px;" onclick="openTableDetail('${table.id}')">${table.description || '暂无描述'}</p>
                        <div class="table-fields" onclick="openTableDetail('${table.id}')">
                            <span class="field-badge">${fieldCount} 个字段</span>
                            <span class="field-badge">${dataCount} 条数据</span>
                        </div>
                        <div class="table-actions">
                            <button class="table-action-btn" style="background-color: var(--primary); color: white;" onclick="openTableDetail('${table.id}')">
                                <i class="fas fa-eye"></i> 查看
                            </button>
                            <button class="table-action-btn" style="background-color: var(--success); color: white;" onclick="addDataToTable('${table.id}')">
                                <i class="fas fa-plus"></i> 添加
                            </button>
                        </div>
                    </div>
                `;
            });
            
            tableList.innerHTML = tablesHTML;
        }

        // 打开数据表详情
        window.openTableDetail = function(tableId) {
            if (!AppState.currentProject || !AppState.currentProject.tables) return;
            
            const table = AppState.currentProject.tables.find(t => t.id === tableId);
            if (!table) return;
            
            AppState.currentTable = table;
            
            // 更新页面
            document.getElementById('databasePage').classList.remove('active');
            document.getElementById('tableDetailPage').classList.add('active');
            
            // 更新标题
            document.getElementById('tableDetailTitle').textContent = table.name;
            document.getElementById('tableDetailDesc').textContent = table.description || '';
            
            // 加载数据
            loadTableDetail(tableId);
        };

        // 添加数据到表
        window.addDataToTable = function(tableId) {
            const table = AppState.currentProject.tables.find(t => t.id === tableId);
            if (!table) return;
            
            AppState.currentTable = table;
            showAddDataModal();
        };

        // 删除数据表
        window.deleteTable = function(tableId, event) {
            event.stopPropagation();
            
            if (!confirm('确定要删除这个数据表吗？所有数据都将丢失！')) {
                return;
            }
            
            if (!AppState.currentProject.tables) return;
            
            const tableIndex = AppState.currentProject.tables.findIndex(t => t.id === tableId);
            if (tableIndex >= 0) {
                AppState.currentProject.tables.splice(tableIndex, 1);
                updateProjectData();
                loadDatabaseTables();
                alert('数据表已删除！');
            }
        };

        // 加载数据表详情
        function loadTableDetail(tableId) {
            const tableDataContent = document.getElementById('tableDataContent');
            const emptyTableData = document.getElementById('emptyTableData');
            
            if (!AppState.currentTable || !AppState.currentTable.data || AppState.currentTable.data.length === 0) {
                emptyTableData.style.display = 'block';
                tableDataContent.innerHTML = '';
                return;
            }
            
            emptyTableData.style.display = 'none';
            
            // 创建表格
            let tableHTML = '<div style="overflow-x: auto;">';
            tableHTML += '<table class="data-table">';
            tableHTML += '<thead><tr>';
            
            // 表头
            AppState.currentTable.fields.forEach(field => {
                const fieldName = Object.keys(field)[0];
                const fieldConfig = field[fieldName];
                tableHTML += `<th>${fieldConfig.label || fieldName}</th>`;
            });
            
            tableHTML += '<th>操作</th></tr></thead>';
            tableHTML += '<tbody>';
            
            // 数据行
            AppState.currentTable.data.forEach((row, index) => {
                tableHTML += '<tr>';
                
                AppState.currentTable.fields.forEach(field => {
                    const fieldName = Object.keys(field)[0];
                    const fieldConfig = field[fieldName];
                    const value = row[fieldName] || '';
                    
                    tableHTML += `<td class="field-value ${fieldConfig.type === 'boolean' ? (value ? 'boolean-true' : 'boolean-false') : ''}">`;
                    
                    switch(fieldConfig.type) {
                        case 'boolean':
                            tableHTML += value ? '是' : '否';
                            break;
                        case 'image':
                            tableHTML += value ? `<img src="${value}" style="width: 40px; height: 40px; object-fit: cover; border-radius: 4px;">` : '-';
                            break;
                        case 'video':
                        case 'audio':
                        case 'file':
                            tableHTML += value ? `<a href="${value}" target="_blank">查看文件</a>` : '-';
                            break;
                        case 'images':
                            try {
                                const images = JSON.parse(value);
                                tableHTML += images.length ? `${images.length} 张图片` : '-';
                            } catch {
                                tableHTML += '-';
                            }
                            break;
                        default:
                            tableHTML += value || '-';
                    }
                    
                    tableHTML += '</td>';
                });
                
                tableHTML += `
                    <td>
                        <button class="btn btn-sm btn-outline" onclick="editTableData('${tableId}', ${index})">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-sm btn-outline" style="margin-left: 4px;" onclick="deleteTableData('${tableId}', ${index})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                
                tableHTML += '</tr>';
            });
            
            tableHTML += '</tbody></table></div>';
            
            tableDataContent.innerHTML = tableHTML;
        }

        // 编辑数据
        window.editTableData = function(tableId, rowIndex) {
            // 在实际实现中，这里会打开编辑表单
            // 为简化，我们在这里显示一个提示
            alert(`编辑第 ${rowIndex + 1} 行数据\n\n在实际版本中，这里会打开编辑表单，允许修改字段值。`);
        };

        // 删除数据
        window.deleteTableData = function(tableId, rowIndex) {
            if (confirm('确定要删除这条数据吗？')) {
                const table = AppState.currentProject.tables.find(t => t.id === tableId);
                if (table && table.data) {
                    table.data.splice(rowIndex, 1);
                    updateProjectData();
                    loadTableDetail(tableId);
                    alert('数据已删除！');
                }
            }
        };

        // 保存当前项目
        function saveCurrentProject() {
            if (!AppState.currentProject) {
                alert('请先选择或创建一个项目');
                return;
            }
            
            // 更新HTML内容
            if (document.getElementById('editorPage').classList.contains('active')) {
                AppState.currentProject.htmlContent = document.getElementById('htmlEditor').value;
            }
            
            // 更新时间
            AppState.currentProject.updatedAt = new Date().toISOString();
            
            // 保存到本地存储
            saveProjectsToStorage();
            
            alert('项目已保存到本地存储！');
        }

        // 显示预览
        function showPreview() {
            const previewContent = document.getElementById('previewContent');
            
            // 根据当前编辑器模式显示预览
            if (document.getElementById('htmlTabBtn').classList.contains('active')) {
                // HTML模式预览
                previewContent.innerHTML = AppState.currentProject.htmlContent || '<p style="text-align: center; padding: 40px; color: #666;">暂无内容</p>';
            } else {
                // 可视化模式预览
                previewContent.innerHTML = '';
                
                // 复制画布内容到预览
                const editorCanvas = document.getElementById('editorCanvas');
                const components = editorCanvas.querySelectorAll('.component-item');
                
                if (components.length === 0) {
                    previewContent.innerHTML = '<p style="text-align: center; padding: 40px; color: #666;">暂无内容，请添加组件</p>';
                } else {
                    components.forEach(component => {
                        const clone = component.cloneNode(true);
                        clone.classList.remove('component-item');
                        clone.classList.remove('selected');
                        clone.classList.remove('dragging');
                        
                        // 移除编辑按钮和拖拽手柄
                        const actions = clone.querySelector('.component-actions');
                        if (actions) actions.remove();
                        
                        const handle = clone.querySelector('.drag-handle');
                        if (handle) handle.remove();
                        
                        previewContent.appendChild(clone);
                    });
                }
            }
            
            // 显示预览模式
            document.getElementById('previewMode').classList.add('active');
            updatePageTitle('预览模式');
        }

        // 关闭预览
        function closePreview() {
            document.getElementById('previewMode').classList.remove('active');
            updatePageTitle(document.querySelector('.tab-item.active').getAttribute('data-page'));
        }

        // 事件编辑器功能
        function loadEventList() {
            const eventListContainer = document.getElementById('eventListContainer');
            eventListContainer.innerHTML = '';
            
            if (AppState.editingEvents.length === 0) {
                eventListContainer.innerHTML = '<p style="text-align: center; color: var(--gray); padding: 20px; font-size: 0.9rem;">暂无事件</p>';
                return;
            }
            
            AppState.editingEvents.forEach((event, index) => {
                const eventHTML = `
                    <div class="event-item">
                        <button class="event-remove-btn" onclick="removeEvent(${index})">
                            <i class="fas fa-times"></i>
                        </button>
                        <div class="event-type">${EventTypes[event.type]?.name || event.type}</div>
                        <div class="event-desc">${getEventDescription(event)}</div>
                    </div>
                `;
                eventListContainer.insertAdjacentHTML('beforeend', eventHTML);
            });
        }

        function getEventDescription(event) {
            switch(event.type) {
                case 'jump':
                    return `跳转到: ${event.target || '未设置'}`;
                case 'modify':
                    return `修改变量: ${event.variable || '未设置'}`;
                case 'database':
                    return `操作数据表: ${event.action || '未设置'}`;
                case 'upload':
                    return '上传文件';
                case 'login':
                    return '登录/注册操作';
                default:
                    return '未知事件';
            }
        }

        function updateEventParams() {
            const eventType = document.getElementById('eventType').value;
            const paramsContainer = document.getElementById('eventParamsContainer');
            
            let paramsHTML = '';
            
            switch(eventType) {
                case 'jump':
                    paramsHTML = `
                        <div class="form-group">
                            <label class="form-label">目标页面或链接</label>
                            <input type="text" class="form-control" id="eventTarget" placeholder="输入页面名称或URL">
                        </div>
                    `;
                    break;
                    
                case 'modify':
                    paramsHTML = `
                        <div class="form-group">
                            <label class="form-label">变量名</label>
                            <input type="text" class="form-control" id="eventVariable" placeholder="例如: $function_listChildInfo.value">
                        </div>
                        <div class="form-group">
                            <label class="form-label">新值</label>
                            <input type="text" class="form-control" id="eventValue" placeholder="输入新值">
                        </div>
                    `;
                    break;
                    
                case 'database':
                    paramsHTML = `
                        <div class="form-group">
                            <label class="form-label">操作类型</label>
                            <select class="form-control" id="eventAction">
                                <option value="query">查询</option>
                                <option value="add">添加</option>
                                <option value="update">修改</option>
                                <option value="delete">删除</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">数据表</label>
                            <input type="text" class="form-control" id="eventTable" placeholder="输入数据表名称">
                        </div>
                    `;
                    break;
                    
                case 'upload':
                    paramsHTML = `
                        <div class="form-group">
                            <label class="form-label">文件类型</label>
                            <select class="form-control" id="eventFileType">
                                <option value="image">图片</option>
                                <option value="video">视频</option>
                                <option value="audio">音频</option>
                            </select>
                        </div>
                    `;
                    break;
                    
                case 'login':
                    paramsHTML = `
                        <div class="form-group">
                            <label class="form-label">操作类型</label>
                            <select class="form-control" id="eventLoginType">
                                <option value="login">登录</option>
                                <option value="register">注册</option>
                            </select>
                        </div>
                    `;
                    break;
            }
            
            paramsContainer.innerHTML = paramsHTML;
        }

        function addNewEvent() {
            const eventType = document.getElementById('eventType').value;
            if (!eventType) {
                alert('请选择事件类型');
                return;
            }
            
            const newEvent = { type: eventType };
            
            // 收集事件参数
            switch(eventType) {
                case 'jump':
                    newEvent.target = document.getElementById('eventTarget').value;
                    break;
                    
                case 'modify':
                    newEvent.variable = document.getElementById('eventVariable').value;
                    newEvent.value = document.getElementById('eventValue').value;
                    break;
                    
                case 'database':
                    newEvent.action = document.getElementById('eventAction').value;
                    newEvent.table = document.getElementById('eventTable').value;
                    break;
                    
                case 'upload':
                    newEvent.fileType = document.getElementById('eventFileType').value;
                    break;
                    
                case 'login':
                    newEvent.loginType = document.getElementById('eventLoginType').value;
                    break;
            }
            
            AppState.editingEvents.push(newEvent);
            loadEventList();
            
            // 清空表单
            document.getElementById('eventType').value = '';
            document.getElementById('eventParamsContainer').innerHTML = '';
        }

        window.removeEvent = function(index) {
            AppState.editingEvents.splice(index, 1);
            loadEventList();
        };

        function saveEventChanges() {
            // 事件已经实时保存到 AppState.editingEvents
            // 返回到组件编辑器
            hideModal();
            showModal('componentModal');
        }

        // 保存项目到本地存储
        function saveProjectsToStorage() {
            localStorage.setItem('mobileWebAppProjects_v3', JSON.stringify(AppState.projects));
        }

        // 更新项目数据
        function updateProjectData() {
            if (AppState.currentProject) {
                AppState.currentProject.updatedAt = new Date().toISOString();
                saveProjectsToStorage();
            }
        }

        // 显示模态框
        function showModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }

        // 隐藏模态框
        function hideModal() {
            document.querySelectorAll('.modal-overlay').forEach(modal => {
                modal.classList.remove('active');
            });
        }

        // 更新页面标题
        function updatePageTitle(title) {
            document.getElementById('pageTitle').textContent = title;
        }

        // 获取组件名称
        function getComponentName(type) {
            const names = {
                text: '文字',
                image: '图片',
                video: '视频',
                button: '按钮',
                list: '列表',
                carousel: '轮播'
            };
            return names[type] || '组件';
        }

        // 格式化日期
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            
            // 如果是今天
            if (diff < 24 * 60 * 60 * 1000) {
                const hours = date.getHours().toString().padStart(2, '0');
                const minutes = date.getMinutes().toString().padStart(2, '0');
                return `今天 ${hours}:${minutes}`;
            }
            
            // 如果是昨天
            if (diff < 2 * 24 * 60 * 60 * 1000) {
                const hours = date.getHours().toString().padStart(2, '0');
                const minutes = date.getMinutes().toString().padStart(2, '0');
                return `昨天 ${hours}:${minutes}`;
            }
            
            // 其他情况
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const day = date.getDate().toString().padStart(2, '0');
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            return `${month}-${day} ${hours}:${minutes}`;
        }
    </script>
</body>
</html>
